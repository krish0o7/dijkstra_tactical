<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dijkstra · Route Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#070a0e;--bg2:#0c1018;--bg3:#111a24;
  --a:#e8a020;--a2:rgba(232,160,32,.12);--ag:rgba(232,160,32,.4);
  --cy:#28b8d8;--gn:#28d870;--rd:#e04040;
  --tx:#b0a070;--tx2:#48566a;--txb:#e0d8c0;
  --bd:rgba(232,160,32,.13);--bd2:rgba(232,160,32,.3);
}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'Rajdhani',sans-serif;overflow:hidden}
body::before{content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(232,160,32,.02) 1px,transparent 1px),
  linear-gradient(90deg,rgba(232,160,32,.02) 1px,transparent 1px);
  background-size:44px 44px;pointer-events:none;z-index:0}
/* HUD corner brackets */
.bk{position:fixed;width:38px;height:38px;border-color:rgba(232,160,32,.5);border-style:solid}
.bk.tl{top:13px;left:13px;border-width:1.5px 0 0 1.5px}
.bk.tr{top:13px;right:13px;border-width:1.5px 1.5px 0 0}
.bk.bl{bottom:13px;left:13px;border-width:0 0 1.5px 1.5px}
.bk.br{bottom:13px;right:13px;border-width:0 1.5px 1.5px 0}
/* Extra tick marks on corners */
.bk::after{content:'';position:absolute;background:rgba(232,160,32,.4)}
.bk.tl::after{width:8px;height:1px;top:6px;left:-1px}
.bk.tr::after{width:1px;height:8px;top:-1px;right:6px}
.bk.bl::after{width:8px;height:1px;bottom:6px;left:-1px}
.bk.br::after{width:1px;height:8px;bottom:-1px;right:6px}

.app{position:relative;z-index:1;height:100vh;display:flex;flex-direction:column;padding:13px 20px 11px}

/* ── HEADER ── */
header{display:flex;align-items:center;justify-content:space-between;
  padding:0 4px 9px;border-bottom:1px solid var(--bd);flex-shrink:0;gap:12px}
.hl{flex-shrink:0}
.hl .tag{font-family:'Space Mono',monospace;font-size:7.5px;letter-spacing:3px;
  color:var(--tx2);margin-bottom:4px}
h1{font-size:clamp(14px,2vw,20px);font-weight:700;letter-spacing:6px;color:var(--txb);line-height:1}
h1 em{font-style:normal;color:var(--a)}
.hr{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap}
.cg{display:flex;flex-direction:column;gap:3px}
.cl{font-family:'Space Mono',monospace;font-size:7px;letter-spacing:2px;color:var(--tx2);text-transform:uppercase}
select{background:var(--bg2);border:1px solid var(--bd2);border-radius:3px;
  color:var(--a);font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;
  letter-spacing:1px;padding:6px 10px;cursor:pointer;outline:none;min-width:138px;transition:border-color .2s}
select:focus{border-color:var(--a)}
select option{background:#0c1018}
.br-row{display:flex;gap:6px;align-items:center}
button{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:1.5px;
  padding:7px 13px;border-radius:3px;cursor:pointer;background:transparent;
  transition:all .15s;white-space:nowrap;border:1px solid;outline:none}
.bc{border-color:var(--a);color:var(--a)}
.bc:hover{background:var(--a2);box-shadow:0 0 16px var(--ag)}
.bs{border-color:var(--tx2);color:var(--tx2)}
.bs:hover{border-color:var(--cy);color:var(--cy)}
.bx{border-color:rgba(224,64,64,.4);color:rgba(224,64,64,.7)}
.bx:hover{border-color:var(--rd);color:var(--rd)}
button:active{transform:scale(.97)}
.sw{display:flex;flex-direction:column;gap:3px}
.st{font-family:'Space Mono',monospace;font-size:7px;letter-spacing:2px;
  color:var(--tx2);display:flex;justify-content:space-between;min-width:90px}
input[type=range]{-webkit-appearance:none;appearance:none;width:90px;height:2px;
  background:var(--bd2);border-radius:1px;outline:none;cursor:pointer;display:block;margin-top:4px}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:11px;height:11px;
  border-radius:50%;background:var(--a);cursor:pointer}

/* ── MAIN ── */
main{flex:1;display:grid;grid-template-columns:210px 1fr;gap:10px;padding-top:10px;min-height:0}
.lp{display:flex;flex-direction:column;gap:8px;min-height:0}
.pc{background:var(--bg2);border:1px solid var(--bd);border-radius:5px;padding:12px;position:relative}
.pc::after{content:'';position:absolute;top:0;left:24px;right:24px;height:1px;
  background:linear-gradient(90deg,transparent,rgba(232,160,32,.2),transparent)}
.pt{font-family:'Space Mono',monospace;font-size:7.5px;letter-spacing:3px;color:var(--a);
  opacity:.7;margin-bottom:10px;display:flex;align-items:center;gap:6px;text-transform:uppercase}
.pt::before{content:'';width:4px;height:4px;border-radius:50%;background:var(--a);flex-shrink:0;box-shadow:0 0 5px var(--a)}
.dt{width:100%;border-collapse:collapse}
.dt th{font-family:'Space Mono',monospace;font-size:7px;letter-spacing:1.5px;
  color:var(--tx2);padding:0 3px 7px;text-align:left;border-bottom:1px solid var(--bd)}
.dt td{padding:6px 3px;border-bottom:1px solid rgba(232,160,32,.04);
  font-weight:600;font-size:13px;transition:color .3s,background .3s}
.dt tr:last-child td{border-bottom:none}
.cd{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:6px;
  vertical-align:middle;background:var(--tx2);transition:all .3s;flex-shrink:0}
.rs .cd{background:var(--a);box-shadow:0 0 7px var(--a)}
.rs td{color:var(--a)}
.rc .cd{background:var(--a);box-shadow:0 0 9px var(--a)}
.rc td{color:#fff;background:rgba(232,160,32,.06)}
.rv .cd{background:var(--cy)}
.rv td{color:var(--cy)}
.rp .cd{background:var(--gn);box-shadow:0 0 7px var(--gn)}
.rp td{color:var(--gn)}
.rd2 .cd{background:var(--gn);box-shadow:0 0 7px var(--gn)}
.rd2 td{color:var(--gn)}
.ru td{color:var(--tx2)}
.dtd{font-family:'Space Mono',monospace;font-size:10px}
#stepLog{font-family:'Space Mono',monospace;font-size:8.5px;line-height:1.95;
  color:var(--tx2);overflow:hidden}
.sl{display:block;padding:1px 0 1px 8px;border-left:2px solid transparent}
.sl.act{border-left-color:var(--a);color:var(--tx)}
.kw{color:var(--cy)}.nm{color:var(--a);font-weight:700}.vl{color:var(--gn)}

/* ── GRAPH ── */
.gw{position:relative;border:1px solid var(--bd);border-radius:5px;overflow:hidden;
  background:var(--bg2)}
.gw::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 65% 55% at 50% 50%,rgba(232,160,32,.03) 0%,transparent 70%);
  pointer-events:none;z-index:1}
#gc{width:100%;height:100%;display:block;cursor:default}
.pb{position:absolute;bottom:0;left:0;right:0;height:2px;background:rgba(232,160,32,.08);z-index:2}
.pf{height:100%;width:0%;transition:width .25s;background:var(--a);box-shadow:0 0 8px var(--a)}

/* tooltip */
#tip{position:absolute;background:rgba(7,10,14,.96);border:1px solid var(--bd2);
  border-radius:4px;padding:8px 11px;pointer-events:none;display:none;z-index:10;
  font-family:'Space Mono',monospace;font-size:9px;line-height:1.7;color:var(--tx)}
#tip .tc{font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;
  color:var(--txb);letter-spacing:1px;margin-bottom:2px}

/* ── FOOTER ── */
footer{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
  padding:8px 4px 0;border-top:1px solid var(--bd);flex-wrap:wrap;gap:8px}
.leg{display:flex;gap:16px;align-items:center;flex-wrap:wrap}
.li{display:flex;align-items:center;gap:6px;font-family:'Space Mono',monospace;
  font-size:7.5px;letter-spacing:.5px;color:var(--tx2)}
.ll{width:20px;height:2px;border-radius:1px}
.ld{width:20px;border-top:2px dashed}
.lb{width:11px;height:8px;border:1.5px solid;border-radius:2px}
.sp{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:2px;padding:4px 11px;border-radius:20px}
.sr{background:rgba(40,184,216,.08);border:1px solid rgba(40,184,216,.3);color:var(--cy)}
.sn{background:rgba(232,160,32,.08);border:1px solid rgba(232,160,32,.35);color:var(--a)}
.sd{background:rgba(40,216,112,.08);border:1px solid rgba(40,216,112,.35);color:var(--gn)}
</style>
</head>
<body>
<div class="bk tl"></div><div class="bk tr"></div>
<div class="bk bl"></div><div class="bk br"></div>

<div class="app">
  <header>
    <div class="hl">
      <p class="tag">GRAPH · ALGORITHM · CS PROJECT DEMO</p>
      <h1>DIJKSTRA <em>·</em> ROUTE INTELLIGENCE</h1>
    </div>
    <div class="hr">
      <div class="cg">
        <div class="cl">Origin City</div>
        <select id="srcSel">
          <option value="0">Delhi</option>
          <option value="1">Mumbai</option>
          <option value="2">Kolkata</option>
          <option value="3">Chennai</option>
          <option value="4">Bangalore</option>
        </select>
      </div>
      <div class="cg">
        <div class="cl">Destination</div>
        <select id="dstSel">
          <option value="0">Delhi</option>
          <option value="1">Mumbai</option>
          <option value="2">Kolkata</option>
          <option value="3">Chennai</option>
          <option value="4" selected>Bangalore</option>
        </select>
      </div>
      <div class="br-row">
        <button class="bc" id="computeBtn">▶ COMPUTE</button>
        <button class="bs" id="stepBtn">⏭ STEP</button>
        <button class="bx" id="resetBtn">↺ RESET</button>
      </div>
      <div class="sw">
        <div class="st"><span>Speed</span><span id="spdLbl">2×</span></div>
        <input type="range" id="spdSlider" min="1" max="5" value="3" step="1">
      </div>
    </div>
  </header>

  <main>
    <div class="lp">
      <div class="pc">
        <div class="pt">Distance Table</div>
        <table class="dt">
          <thead><tr><th>City</th><th>Dist</th><th>Via</th></tr></thead>
          <tbody id="dtbody"></tbody>
        </table>
      </div>
      <div class="pc" style="flex:1;overflow:hidden">
        <div class="pt">Algorithm Log</div>
        <div id="stepLog"></div>
      </div>
    </div>
    <div class="gw">
      <canvas id="gc"></canvas>
      <div class="pb"><div class="pf" id="pfill"></div></div>
      <div id="tip"><div class="tc" id="tipCity"></div><div id="tipBody"></div></div>
    </div>
  </main>

  <footer>
    <div class="leg">
      <div class="li"><div class="ll" style="background:rgba(55,75,100,.85)"></div>Skipped edge</div>
      <div class="li"><div class="ll" style="background:var(--cy)"></div>Tree edge</div>
      <div class="li"><div class="ld" style="border-color:var(--a)"></div>Shortest path</div>
      <div class="li"><div class="lb" style="border-color:var(--a)"></div>Source / Dest</div>
      <div class="li"><div class="lb" style="border-color:rgba(55,75,100,.85)"></div>City node</div>
    </div>
    <span class="sp sr" id="stp">READY</span>
  </footer>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────
const CITIES = ['Delhi','Mumbai','Kolkata','Chennai','Bangalore'];
const GRAPH = [
  [0,  10,  0, 30, 100],
  [10,  0, 50,  0,   0],
  [ 0, 50,  0, 20,  10],
  [30,  0, 20,  0,  60],
  [100, 0, 10, 60,   0]
];
const N = 5;
const INF = Infinity;

// Logical canvas: 700×450
const CW = 700, CH = 450;

// Node centers (logical coords)
const NP = [
  {x: 318, y:  84},  // Delhi
  {x: 108, y: 248},  // Mumbai
  {x: 572, y: 150},  // Kolkata
  {x: 512, y: 368},  // Chennai
  {x: 216, y: 372},  // Bangalore
];
const NW = 148, NH = 52;

// Pre-compute all edges
const EDGES = [];
for (let u = 0; u < N; u++)
  for (let v = u + 1; v < N; v++)
    if (GRAPH[u][v]) EDGES.push({u, v, w: GRAPH[u][v]});

function eKey(u, v) { return u < v ? `${u}:${v}` : `${v}:${u}`; }

// ── ALGORITHM ─────────────────────────────────────────────────
function treeEst(par) {
  const e = {};
  for (let i = 0; i < N; i++) if (par[i] !== -1) e[eKey(par[i], i)] = 'tree';
  return e;
}

function getPathEdges(par, src, dst) {
  const s = new Set();
  let c = dst;
  while (par[c] !== -1) { s.add(eKey(par[c], c)); c = par[c]; }
  return s;
}

function getPathNodes(par, src, dst) {
  const s = new Set([dst]);
  let c = dst;
  while (par[c] !== -1) { c = par[c]; s.add(c); }
  return s;
}

function buildFrames(src, dst) {
  const frames = [];
  const dist = Array(N).fill(INF);
  const vis  = Array(N).fill(false);
  const par  = Array(N).fill(-1);
  dist[src] = 0;

  const mkNst = (cur = -1) => Array.from({length: N}, (_, i) => {
    if (i === src) return 'src';
    if (i === dst) return 'dst';
    if (i === cur) return 'cur';
    if (vis[i])    return 'vis';
    return 'unv';
  });

  frames.push({
    type:'init', dist:[...dist], vis:[...vis], par:[...par],
    nst: mkNst(), est: {}, ae: null,
    msg: `<span class="kw">INIT</span> · src = <span class="nm">${CITIES[src]}</span> · dist[src] = <span class="vl">0</span>`
  });

  for (let iter = 0; iter < N - 1; iter++) {
    let u = -1;
    for (let i = 0; i < N; i++) if (!vis[i] && (u === -1 || dist[i] < dist[u])) u = i;
    if (u === -1 || dist[u] === INF) break;

    frames.push({
      type: 'select', dist:[...dist], vis:[...vis], par:[...par],
      nst: mkNst(u), est: treeEst(par), ae: null,
      msg: `<span class="kw">SELECT</span> · <span class="nm">${CITIES[u]}</span> · min dist = <span class="vl">${dist[u]}</span>`
    });

    vis[u] = true;

    for (let v = 0; v < N; v++) {
      if (!vis[v] && GRAPH[u][v]) {
        const nd = dist[u] + GRAPH[u][v];
        const k = eKey(u, v);
        frames.push({
          type:'check', dist:[...dist], vis:[...vis], par:[...par],
          nst: mkNst(u), est: {...treeEst(par), [k]:'check'}, ae: {u, v},
          msg: `<span class="kw">CHECK</span> · ${CITIES[u]}→${CITIES[v]}: ${dist[u]}+${GRAPH[u][v]}=<span class="vl">${nd}</span>`
        });

        if (nd < dist[v]) {
          dist[v] = nd; par[v] = u;
          frames.push({
            type:'relax', dist:[...dist], vis:[...vis], par:[...par],
            nst: mkNst(u), est: treeEst(par), ae: {u, v},
            msg: `<span class="kw">RELAX</span> · <span class="nm">${CITIES[v]}</span> updated → <span class="vl">${nd}</span> via ${CITIES[u]}`
          });
        } else {
          frames.push({
            type:'skip', dist:[...dist], vis:[...vis], par:[...par],
            nst: mkNst(u), est: {...treeEst(par), [k]:'skip'}, ae: {u, v},
            msg: `<span class="kw">SKIP</span> · ${CITIES[v]} already <span class="vl">${dist[v]}</span> ≤ ${nd}`
          });
        }
      }
    }
  }

  // Final frame
  const pe = getPathEdges(par, src, dst);
  const pn = getPathNodes(par, src, dst);
  const finalEst = {};
  for (let i = 0; i < N; i++) {
    if (par[i] !== -1) {
      const k = eKey(par[i], i);
      finalEst[k] = pe.has(k) ? 'path' : 'tree';
    }
  }
  const nstFinal = Array.from({length: N}, (_, i) => {
    if (i === src) return 'src';
    if (pn.has(i)) return 'path';
    if (vis[i]) return 'vis';
    return 'unv';
  });

  frames.push({
    type:'done', dist:[...dist], vis:[...vis], par:[...par],
    nst: nstFinal, est: finalEst, ae: null,
    msg: `<span class="kw">DONE</span> · <span class="nm">${CITIES[src]}</span>→<span class="nm">${CITIES[dst]}</span> = <span class="vl">${dist[dst] === INF ? '∞' : dist[dst]+' km'}</span>`
  });

  return frames;
}

// ── CANVAS DRAW ───────────────────────────────────────────────
const canvas = document.getElementById('gc');
const ctx    = canvas.getContext('2d');
canvas.width = CW; canvas.height = CH;

let dashOff = 0;
let scanY   = 0;
let pulseT  = 0;

function rr(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y); ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r); ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h); ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r); ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

function drawBg() {
  // Subtle dot grid
  ctx.fillStyle = 'rgba(232,160,32,0.055)';
  for (let x = 32; x < CW; x += 40)
    for (let y = 24; y < CH; y += 40) {
      ctx.beginPath(); ctx.arc(x, y, 1.2, 0, Math.PI * 2); ctx.fill();
    }
  // Scan line
  const sy = (scanY % CH);
  const g = ctx.createLinearGradient(0, sy - 18, 0, sy + 18);
  g.addColorStop(0, 'rgba(232,160,32,0)');
  g.addColorStop(0.5, 'rgba(232,160,32,0.04)');
  g.addColorStop(1, 'rgba(232,160,32,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0, sy - 18, CW, 36);
}

function edgeC(st) {
  switch (st) {
    case 'check': return '#e8a020';
    case 'tree':  return '#28b8d8';
    case 'path':  return '#e8a020';
    case 'skip':  return 'rgba(50,68,88,0.55)';
    default:      return 'rgba(42,58,76,0.65)';
  }
}

function drawEdge(u, v, w, st) {
  const a = NP[u], b = NP[v];
  const isPath  = st === 'path';
  const isCheck = st === 'check';

  ctx.save();
  ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);
  ctx.strokeStyle = edgeC(st);
  ctx.lineWidth = isPath ? 2.8 : isCheck ? 2.2 : 1.3;
  ctx.lineCap = 'round';

  if (isPath) {
    ctx.setLineDash([11, 6]);
    ctx.lineDashOffset = -dashOff;
    ctx.shadowColor = 'rgba(232,160,32,0.7)';
    ctx.shadowBlur  = 14;
  } else if (isCheck) {
    ctx.setLineDash([7, 4]);
    ctx.shadowColor = 'rgba(232,160,32,0.45)';
    ctx.shadowBlur  = 9;
  } else if (st === 'tree') {
    ctx.shadowColor = 'rgba(40,184,216,0.35)';
    ctx.shadowBlur  = 6;
  }
  ctx.stroke();
  ctx.restore();

  // Weight label pill
  const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2;
  const dx = b.x - a.x, dy = b.y - a.y, len = Math.hypot(dx, dy);
  const ox = -dy / len * 16, oy = dx / len * 16;
  const lx = mx + ox, ly = my + oy;
  const txt = `${w} km`;

  ctx.save();
  ctx.font = '700 9.5px "Space Mono",monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  const tw = ctx.measureText(txt).width;
  const pw = tw + 16, ph = 15;

  // pill bg
  ctx.fillStyle = 'rgba(7,10,14,.92)';
  rr(lx - pw / 2, ly - ph / 2, pw, ph, 3);
  ctx.fill();

  // pill border (very subtle)
  ctx.strokeStyle = st === 'none' || st === 'skip' ? 'rgba(40,55,72,.4)' : edgeC(st);
  ctx.lineWidth = 0.5;
  rr(lx - pw / 2, ly - ph / 2, pw, ph, 3);
  ctx.stroke();

  ctx.fillStyle = st === 'none' || st === 'skip' ? 'rgba(65,85,108,0.85)' : edgeC(st);
  ctx.fillText(txt, lx, ly + 0.5);
  ctx.restore();
}

function drawNode(i, st, dist, isSrc, isDst) {
  const {x, y} = NP[i];
  const nx = x - NW / 2, ny = y - NH / 2;

  // State colors
  let bg, stroke, lw, glowC = null;
  switch (st) {
    case 'src':  bg='#160e00'; stroke='#e8a020'; lw=2;   glowC='rgba(232,160,32,.55)'; break;
    case 'dst':  bg='#061520'; stroke='#28d870'; lw=2;   glowC='rgba(40,216,112,.45)'; break;
    case 'cur':  bg='#130c00'; stroke='#e8a020'; lw=2;   glowC='rgba(232,160,32,.45)'; break;
    case 'vis':  bg='#051420'; stroke='#1a6888'; lw=1.5; break;
    case 'path': bg='#071500'; stroke='#28d870'; lw=2;   glowC='rgba(40,216,112,.55)'; break;
    default:     bg='#0d1520'; stroke='#263848'; lw=1.2;
  }

  ctx.save();
  if (glowC) { ctx.shadowColor = glowC; ctx.shadowBlur = 22; }
  rr(nx, ny, NW, NH, 5);
  ctx.fillStyle = bg; ctx.fill();
  ctx.strokeStyle = stroke; ctx.lineWidth = lw;
  ctx.stroke();
  ctx.restore();

  // Pulse ring on src/dst/cur
  if (glowC) {
    const pulse = (Math.sin(pulseT * 2 + i) + 1) / 2;
    ctx.save();
    ctx.beginPath();
    rr(nx - 5 - pulse * 4, ny - 5 - pulse * 4, NW + 10 + pulse * 8, NH + 10 + pulse * 8, 8);
    ctx.strokeStyle = glowC;
    ctx.lineWidth = 1;
    ctx.globalAlpha = 0.4 * (1 - pulse * 0.7);
    ctx.stroke();
    ctx.restore();
  }

  // City name
  ctx.save();
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = '700 13.5px "Rajdhani",sans-serif';
  ctx.fillStyle = st === 'unv' ? '#445568' : '#e0d8c0';
  ctx.fillText(CITIES[i].toUpperCase(), x, y - 9);

  // Sub label (distance + tag)
  let sub;
  const dv = dist === INF ? '∞' : dist;
  if (isSrc)                    sub = `SOURCE · 0 KM`;
  else if (isDst && dist < INF) sub = `${dv} KM · END`;
  else if (isDst)               sub = `? KM · END`;
  else                          sub = dist === INF ? '—' : `${dv} KM`;

  ctx.font = '700 9px "Space Mono",monospace';
  const subC = { src:'#e8a020', dst:'#28d870', cur:'#e8c060',
    vis:'#28b8d8', path:'#28d870', unv:'#3a4c5e' };
  ctx.fillStyle = subC[st] || '#3a4c5e';
  ctx.fillText(sub, x, y + 10);
  ctx.restore();
}

function drawFrame(f) {
  ctx.clearRect(0, 0, CW, CH);
  drawBg();

  // Edges (drawn before nodes so nodes sit on top)
  EDGES.forEach(({u, v, w}) => {
    drawEdge(u, v, w, f.est[eKey(u, v)] || 'none');
  });

  // Nodes
  const srcV = parseInt(document.getElementById('srcSel').value);
  const dstV = parseInt(document.getElementById('dstSel').value);
  for (let i = 0; i < N; i++) drawNode(i, f.nst[i], f.dist[i], i === srcV, i === dstV);
}

// ── UI ────────────────────────────────────────────────────────
function updateTable(f) {
  const srcV = parseInt(document.getElementById('srcSel').value);
  const dstV = parseInt(document.getElementById('dstSel').value);
  document.getElementById('dtbody').innerHTML = CITIES.map((c, i) => {
    const d = f.dist[i];
    const via = f.par[i] >= 0 ? CITIES[f.par[i]] : (i === srcV ? '—' : '?');
    const ns = f.nst[i];
    let cls = 'ru';
    if (ns === 'src')  cls = 'rs';
    else if (ns === 'cur')  cls = 'rc';
    else if (ns === 'path') cls = 'rp';
    else if (i === dstV && f.type === 'done') cls = 'rd2';
    else if (ns === 'vis')  cls = 'rv';
    const dStr = d === INF ? '∞' : d;
    return `<tr class="${cls}">
      <td><span class="cd"></span>${c}</td>
      <td class="dtd">${dStr}${d !== INF && d !== 0 ? '' : ''}</td>
      <td style="font-family:'Space Mono',monospace;font-size:9.5px;color:var(--tx2)">${via}</td>
    </tr>`;
  }).join('');
}

let logLines = [];
function updateLog(f) {
  logLines.push(f.msg);
  if (logLines.length > 6) logLines.shift();
  document.getElementById('stepLog').innerHTML =
    logLines.map((l, i, a) => `<span class="sl${i === a.length - 1 ? ' act' : ''}">${l}</span>`).join('');
}

function setStatus(s) {
  const p = document.getElementById('stp');
  p.className = 'sp';
  if (s === 'run')       { p.classList.add('sn'); p.textContent = 'COMPUTING'; }
  else if (s === 'done') { p.classList.add('sd'); p.textContent = 'COMPLETE'; }
  else                   { p.classList.add('sr'); p.textContent = 'READY'; }
}

// Tooltip
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const sx = CW / rect.width, sy = CH / rect.height;
  const mx = (e.clientX - rect.left) * sx;
  const my = (e.clientY - rect.top) * sy;
  const tip = document.getElementById('tip');
  let hit = -1;
  for (let i = 0; i < N; i++) {
    const {x, y} = NP[i];
    if (mx >= x - NW/2 && mx <= x + NW/2 && my >= y - NH/2 && my <= y + NH/2) { hit = i; break; }
  }
  if (hit >= 0 && frames[fIdx]) {
    const f = frames[fIdx];
    const d = f.dist[hit];
    const p = f.par[hit];
    const edges = EDGES.filter(e => e.u === hit || e.v === hit);
    document.getElementById('tipCity').textContent = CITIES[hit];
    document.getElementById('tipBody').innerHTML =
      `Distance: ${d === INF ? '∞' : d + ' km'}<br>` +
      `Via: ${p >= 0 ? CITIES[p] : '—'}<br>` +
      `Connections: ${edges.map(e => e.u === hit ? CITIES[e.v] : CITIES[e.u]).join(', ')}`;
    const tx = (NP[hit].x + NW/2 + 8) / CW * rect.width;
    const ty = (NP[hit].y - NH/2) / CH * rect.height;
    tip.style.left = (rect.left + tx - canvas.getBoundingClientRect().left + 8) + 'px';
    tip.style.top = ty + 'px';
    tip.style.display = 'block';
  } else {
    document.getElementById('tip').style.display = 'none';
  }
});
canvas.addEventListener('mouseleave', () => {
  document.getElementById('tip').style.display = 'none';
});

// ── STATE MACHINE ─────────────────────────────────────────────
let frames = [], fIdx = 0, playing = false, timer = null;

function getDelay() {
  return [1100, 680, 400, 220, 100][parseInt(document.getElementById('spdSlider').value) - 1];
}

function init() {
  const src = parseInt(document.getElementById('srcSel').value);
  const dst = parseInt(document.getElementById('dstSel').value);
  frames = buildFrames(src, dst);
  fIdx = 0; logLines = [];
  document.getElementById('pfill').style.width = '0%';
  setStatus('rdy');
  updateTable(frames[0]);
  updateLog(frames[0]);
}

function renderIdx(i) {
  const f = frames[i]; if (!f) return;
  updateTable(f);
  updateLog(f);
  document.getElementById('pfill').style.width =
    Math.round(i / (frames.length - 1) * 100) + '%';
  if (f.type === 'done') setStatus('done');
}

function stepFwd() {
  if (fIdx < frames.length - 1) { fIdx++; renderIdx(fIdx); }
}

function startPlay() {
  if (fIdx >= frames.length - 1) { init(); setTimeout(startPlay, 80); return; }
  playing = true; setStatus('run');
  document.getElementById('computeBtn').textContent = '⏸ PAUSE';
  timer = setInterval(() => { stepFwd(); if (fIdx >= frames.length - 1) stopPlay(); }, getDelay());
}

function stopPlay() {
  playing = false; clearInterval(timer); timer = null;
  document.getElementById('computeBtn').textContent = '▶ COMPUTE';
  if (frames[fIdx] && frames[fIdx].type !== 'done') setStatus('rdy');
}

// ── ANIMATION LOOP ────────────────────────────────────────────
function loop() {
  dashOff = (dashOff + 0.45) % 34;
  scanY   = (scanY + 0.55) % CH;
  pulseT += 0.03;
  if (frames[fIdx]) drawFrame(frames[fIdx]);
  requestAnimationFrame(loop);
}

// ── EVENTS ────────────────────────────────────────────────────
document.getElementById('computeBtn').addEventListener('click', () => playing ? stopPlay() : startPlay());
document.getElementById('stepBtn').addEventListener('click', () => { stopPlay(); stepFwd(); });
document.getElementById('resetBtn').addEventListener('click', () => { stopPlay(); init(); });
document.getElementById('srcSel').addEventListener('change', () => { stopPlay(); init(); });
document.getElementById('dstSel').addEventListener('change', () => { stopPlay(); init(); });
document.getElementById('spdSlider').addEventListener('input', function () {
  document.getElementById('spdLbl').textContent = ['0.5×','1×','2×','3×','5×'][this.value - 1];
  if (playing) { stopPlay(); startPlay(); }
});

// ── BOOT ─────────────────────────────────────────────────────
init();
loop();
</script>
